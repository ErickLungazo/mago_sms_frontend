name: Deploy React Frontend

on:
  push:
    branches:
      - main # Triggers the deployment whenever you push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies & Build
        run: |
          npm install
          npm run build

      - name: Sync Files to cPanel via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          # Uploads only the compiled contents of your local 'dist' folder
          local-dir: ./dist/
          # Destination path inside cPanel where your frontend assets live
          server-dir: ./public_html/mago-sms/frontend/dist/
